<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Maquetación Bootstrap</title>
</head>

<body>

<div class="container border mt-4">

    <!-- MENÚ -->
    <nav class="text-white p-3" style="background-color: #1f7de8ef; font-size: 2rem;">
        Mi Sitio
    </nav>


    <!-- TARJETAS -->
    <div class="row text-center mt-4">

        <div class="col-md-4">
            <div class="card p-3 text-primary">
                <h5>Tarjeta 1</h5>
                <p class="text-black">Contenido de ejemplo con algunas palabras.</p>
                <button class="btn btn-outline-primary">Leer más</button>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 text-success">
                <h5>Tarjeta 2</h5>
                <p class="text-black">Contenido de ejemplo con algunas palabras.</p>
                <button class="btn btn-outline-primary">Leer más</button>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 text-danger">
                <h5>Tarjeta 3</h5>
                <p class="text-black">Contenido de ejemplo con algunas palabras.</p>
                <button class="btn btn-outline-primary">Leer más</button>
            </div>
        </div>

    </div>


    <!-- TITULO CENTRADO -->
    <div class="text-center my-5">
        <h2>Título Centrado</h2>
        <p class="lead">Texto descriptivo con tamaño más grande</p>
    </div>


    <!-- COLUMNAS INFERIORES -->
    <div class="row text-center pb-4">

        <div class="col-md-3">
            <div class="p-3 border text-white" style="background-color: #1f7de8ef;">Columna 1</div>
        </div>

        <div class="col-md-3">
            <div class="p-3 border text-white" style="background-color: #048d22;">Columna 2</div>
        </div>

        <div class="col-md-3">
            <div class="p-3 border text-white" style="background-color: #358df2;">Columna 3</div>
        </div>

        <div class="col-md-3">
            <div class="p-3 border" style="background-color: #e5f500;">Columna 4</div>
        </div>

    </div>

</div>

</body>
</html>
