<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FreshCart</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.hero{
    --hero-size: 320px;
    padding:0;
    margin-left: 50px;
    margin-right: 50px;
    background-color:#d9ffed;
}

.hero .row{
    min-height: var(--hero-size);
}

.hero-img{
    width:100%;
    max-width:520px;
    height: var(--hero-size);
    object-fit: cover;
}

.hero-image-wrap{
    padding:20px;
}

@media (max-width: 992px){
    .hero{
        --hero-size: 260px;
        margin-left: 1rem;
        margin-right: 1rem;
        padding:1.5rem 0;
    }

    .hero .row{
        min-height: auto;
    }
}

.categorias img{
    width:60px;
}

.categoria{
    text-align:center;
}

.nav-link {
    background-color: white;
    color: black !important;
    border-radius: 0;
    padding: 8px 20px !important;
    margin: 0 5px;
    border: 1px solid #ddd;
}

.nav-link:hover {
    background-color: #06ca2a;
    color: white !important;
}

.nav-link.active {
    background-color: #059b21;
    color: white !important;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg bg-light">
<div class="container-fluid">
<div class="row w-100 align-items-center g-2">

<div class="col-12 col-lg-3">
<a class="navbar-brand fw-bold fs-3 mb-0" href="#">🏠 FreshCart</a>
</div>

<div class="col-12 col-lg-6 d-flex justify-content-center">
<div class="d-flex align-items-center gap-2 w-100">
<form class="flex-grow-1" role="search">
<div class="input-group">
<input id="searchInput" class="form-control" type="search" placeholder="Buscar productos" aria-label="Buscar productos">
<button id="searchButton" class="btn btn-outline-secondary" type="submit" aria-label="Buscar" disabled>🔍</button>
</div>
</form>
<button class="btn btn-outline-secondary" type="button" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Tu ubicacion actual">📍 Ubicación</button>
</div>
</div>

<div class="col-12 col-lg-3 d-flex justify-content-lg-end justify-content-center">
<div class="d-flex gap-2">
<button class="btn btn-outline-secondary" type="button" aria-label="Favoritos" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Favoritos">❤</button>
<button class="btn btn-outline-secondary" type="button" aria-label="Inicio de sesion" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Cuenta cliente">👤</button>
<button class="btn btn-outline-secondary" type="button" aria-label="Mensajes" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Mensajes">✉</button>
</div>
</div>

</div>

</div>
</nav>

<!-- MENU -->
<nav class="navbar navbar-expand-lg bg-light border-top py-2">
<div class="container-fluid">
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav me-auto">
<li class="nav-item"><a class="nav-link active" href="#">Inicio</a></li>
<li class="nav-item"><a class="nav-link" href="#">Tienda</a></li>
<li class="nav-item"><a class="nav-link" href="#">Ofertas</a></li>
<li class="nav-item"><a class="nav-link" href="#">Promociones</a></li>
<li class="nav-item"><a class="nav-link" href="#">Blog</a></li>
<li class="nav-item"><a class="nav-link" href="#">Contacto</a></li>
</ul>
</div>
</div>
</nav>

<!-- HERO -->
<section class="hero">

<div class="container">

<div class="row align-items-center">

<!-- TEXTO -->
<div class="col-md-6">

<h1 class="fw-bold">
Supermercado para alimentos frescos
</h1>

<p>
Compra frutas, verduras y alimentos saludables
con la mejor calidad para tu hogar.
</p>

<button class="btn btn-success">
Comprar ahora
</button>

</div>

<!-- IMAGEN -->
<div class="col-md-6 d-flex justify-content-center hero-image-wrap">

<img src="https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=900&q=80" class="img-fluid hero-img" alt="Interior de un supermercado">

</div>

</div>  

</div>

</section>


<!-- CATEGORIAS -->
<section class="categorias py-5 bg-light">

<div class="container">

<h4 class="mb-4">Categorías destacadas</h4>

<div class="d-flex justify-content-between flex-wrap">

<div class="categoria">
<img src="https://cdn-icons-png.flaticon.com/512/415/415733.png" alt="Frutas">
<p>Frutas</p>
</div>

<div class="categoria">
<img src="https://img.icons8.com/color/96/broccoli.png" alt="Verduras">
<p>Verduras</p>
</div>

<div class="categoria">
<img src="https://img.icons8.com/color/96/cola.png" alt="Bebidas">
<p>Bebidas</p>
</div>

<div class="categoria">
<img src="https://img.icons8.com/color/96/milk-bottle.png" alt="Lacteos">
<p>Lácteos</p>
</div>

<div class="categoria">
<img src="https://img.icons8.com/color/96/bread.png" alt="Panaderia">
<p>Panadería</p>
</div>

</div>

</div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');
tooltipTriggerList.forEach(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl));

document.querySelectorAll('.navbar-nav .nav-link').forEach(link => {
    link.addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelectorAll('.navbar-nav .nav-link').forEach(l => l.classList.remove('active'));
        this.classList.add('active');
    });
});

const searchInput = document.getElementById('searchInput');
const searchButton = document.getElementById('searchButton');

if (searchInput && searchButton) {
    const updateSearchButtonState = () => {
        searchButton.disabled = searchInput.value.trim().length === 0;
    };

    searchInput.addEventListener('input', updateSearchButtonState);
    updateSearchButtonState();
}
</script>

</body>
</html>
